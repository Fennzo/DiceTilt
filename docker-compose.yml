services:
  # =============================================================
  # DATA & MESSAGING LAYER
  # =============================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"  # host-exposed for local debugging only — no auth; remove in production
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - backend-net

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - backend-net

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/init-kafka.sh:/init-kafka.sh:ro
    entrypoint: ["/bin/bash", "/init-kafka.sh"]
    networks:
      - backend-net

  # =============================================================
  # BLOCKCHAIN NODES (Phase 5)
  # =============================================================

  evm-node:
    image: ghcr.io/foundry-rs/foundry:latest
    environment:
      ANVIL_IP_ADDR: 0.0.0.0
    command: anvil --host 0.0.0.0
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend-net

  evm-deploy:
    build:
      context: .
      dockerfile: docker/evm-deploy.Dockerfile
    network_mode: "service:evm-node"
    environment:
      EVM_RPC_URL: http://127.0.0.1:8545
      TREASURY_OWNER_PRIVATE_KEY: ${TREASURY_OWNER_PRIVATE_KEY}
    volumes:
      - treasury-addr:/shared
    depends_on:
      evm-node:
        condition: service_healthy

  # =============================================================
  # APPLICATION SERVICES
  # =============================================================

  pf-worker:
    build:
      context: .
      dockerfile: services/provably-fair/Dockerfile
    environment:
      PF_PORT: 3001
      PF_AUTH_TOKEN: ${PF_AUTH_TOKEN}
      LOG_LEVEL: "info"
    volumes:
      - ./logs/provably-fair:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend-net

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    volumes:
      - treasury-addr:/shared:ro
      - ./logs/api-gateway:/app/logs
    environment:
      API_PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URI: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      PF_WORKER_URL: http://pf-worker:3001
      PF_AUTH_TOKEN: ${PF_AUTH_TOKEN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      EVM_RPC_URL: http://evm-node:8545
      PUBLIC_EVM_RPC_URL: http://localhost:8545
      # TREASURY_CONTRACT_ADDRESS is intentionally NOT set here.
      # api-gateway reads it from /shared/treasury-addr (same volume as evm-listener)
      # so both services always reference the same deployed contract.
      TEST_MODE: "${TEST_MODE:-false}"
      LOG_LEVEL: "info"
      CLUSTER_WORKERS: "4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      pf-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "3000:3000"
    networks:
      - backend-net

  # =============================================================
  # FRONTEND & OBSERVABILITY
  # =============================================================

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - backend-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      pf-worker:
        condition: service_healthy
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend-net

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend-net

  evm-listener:
    build:
      context: .
      dockerfile: services/evm-listener/Dockerfile
    environment:
      EVM_RPC_URL: http://evm-node:8545
      EVM_RPC_WS_URL: ws://evm-node:8545
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_LEVEL: "info"
    volumes:
      - treasury-addr:/shared:ro
      - ./logs/evm-listener:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      evm-deploy:
        condition: service_completed_successfully
      evm-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend-net

  evm-payout-worker:
    build:
      context: .
      dockerfile: services/evm-payout-worker/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      EVM_RPC_URL: http://evm-node:8545
      TREASURY_OWNER_PRIVATE_KEY: ${TREASURY_OWNER_PRIVATE_KEY}
      LOG_LEVEL: "info"
    volumes:
      - treasury-addr:/shared:ro
      - ./logs/evm-payout-worker:/app/logs
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      evm-deploy:
        condition: service_completed_successfully
      evm-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3020/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend-net

  ledger-consumer:
    build:
      context: .
      dockerfile: services/ledger-consumer/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      LEDGER_KAFKA_GROUP_ID: ledger-persistent-group
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URI: redis://redis:6379
      LOG_LEVEL: "info"
    volumes:
      - ./logs/ledger-consumer:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend-net

# =============================================================
# NETWORKS
# =============================================================
networks:
  backend-net:
    driver: bridge

# =============================================================
# VOLUMES
# =============================================================
volumes:
  pgdata:
  redisdata:
  treasury-addr:
